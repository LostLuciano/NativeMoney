name: Build Unsigned IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Application (Unsigned)
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Available Xcode Versions
        run: |
          ls /Applications | grep Xcode || true

      - name: Select Xcode 16
        run: |
          if [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            echo "Xcode 16 not found. iOS 18 build requires Xcode 16 or newer."
            exit 1
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Clear Xcode Cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/com.apple.dt.Xcode

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Xcode Project
        run: |
          cd ${{ github.workspace }}
          python3 Scripts/generate_xcodeproj.py

      - name: Verify Project Settings
        run: |
          grep -n "IPHONEOS_DEPLOYMENT_TARGET\|SWIFT_VERSION" MonassistNative.xcodeproj/project.pbxproj || true

      - name: Build and Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project MonassistNative.xcodeproj \
            -scheme MonassistNative \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/MonassistNative.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            VALIDATE_PRODUCT=NO

      - name: Package IPA and ZIP
        run: |
          mkdir -p build/Payload
          cp -r build/MonassistNative.xcarchive/Products/Applications/MonassistNative.app build/Payload/
          cd build
          
          # Create IPA (zip with .ipa extension)
          zip -r MonassistNative.ipa Payload
          echo "IPA created:"
          du -sh MonassistNative.ipa
          
          # Create separate ZIP file
          zip -r MonassistNative.zip Payload
          echo "ZIP created:"
          du -sh MonassistNative.zip

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonassistNative-Unsigned-IPA
          path: build/MonassistNative.ipa
          if-no-files-found: error

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonassistNative-Unsigned-ZIP
          path: build/MonassistNative.zip
          if-no-files-found: error

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Xcode Version**: $(xcodebuild -version)" >> $GITHUB_STEP_SUMMARY
          echo "- **iOS SDK**: $(xcrun --sdk iphoneos --show-sdk-version)" >> $GITHUB_STEP_SUMMARY

